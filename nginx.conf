server {
    listen 80;
    server_name autoclipper.sir-l.web.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name autoclipper.sir-l.web.id;

    ssl_certificate /etc/letsencrypt/live/autoclipper.sir-l.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoclipper.sir-l.web.id/privkey.pem;

    # Max upload size
    client_max_body_size 500M;
    proxy_request_buffering off;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend (Expo web build)
    location / {
        root /var/www/autoclipper.sir-l.web.id/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
